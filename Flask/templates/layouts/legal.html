<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>{% block title %}{% endblock %} - Priority Pulse</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { primary: '#6e00ff', 'primary-hover': '#5a00d1' }
                }
            }
        }
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f3f4f6; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
    </style>
</head>
<body class="font-sans bg-[#f8f9fa] text-gray-900 antialiased min-h-screen flex flex-col items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    
    <div class="w-full max-w-4xl space-y-8">
        <div class="flex flex-col items-center justify-center">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Priority Pulse" class="h-16 w-auto mb-4 drop-shadow-sm"/>
        </div>

        <div class="bg-white shadow-xl rounded-3xl overflow-hidden border border-gray-100">
            <div class="px-8 py-10 sm:px-12">
                
                <div class="text-center mb-10">
                    <h1 class="text-3xl font-black text-primary mb-2">{% block doc_title %}{% endblock %}</h1>
                    <p class="text-gray-500 font-medium">Última actualización: 24 de Octubre, 2024</p>
                </div>

                <div class="h-[400px] overflow-y-auto pr-4 custom-scrollbar text-gray-600 space-y-8">
                    {% block content %}{% endblock %}
                </div>

                <div class="mt-8 pt-6 border-t border-gray-100 flex flex-col sm:flex-row gap-4 justify-between items-center">
                    <a href="{% block back_url %}#{% endblock %}" class="w-full sm:w-auto px-6 py-3 rounded-xl border border-gray-200 text-gray-600 font-bold hover:bg-gray-50 transition-colors text-center text-sm shadow-sm">
                        {% block back_text %}Volver al registro{% endblock %}
                    </a>
                    <a href="{% block action_url %}#{% endblock %}" class="w-full sm:w-auto px-8 py-3 rounded-xl bg-primary text-white font-bold shadow-md hover:bg-primary-hover transition-all text-center text-sm">
                        {% block action_text %}Aceptar y continuar{% endblock %}
                    </a>
                </div>

            </div>
        </div>

        <p class="text-center text-xs font-semibold text-gray-400">
            © 2026 Priority Pulse Inc. Todos los derechos reservados.
        </p>
    </div>
</body>
</html>
