version: '3.8'

services:
  laravel:
    build: ./Laravel
    container_name: priority_pulse_laravel
    ports:
      - "8000:80"
    volumes:
      - ./Laravel:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
      - /var/www/html/public/build
    networks:
      - priority_pulse_net

  flask:
    build: ./Flask
    container_name: priority_pulse_flask
    ports:
      - "5000:5000"
    volumes:
      - ./Flask:/app
    environment:
      - FLASK_APP=app.py       
      - FLASK_DEBUG=1
    command: flask run --host=0.0.0.0 --port=5000 
    networks:
      - priority_pulse_net

networks:
  priority_pulse_net:
    driver: bridge
